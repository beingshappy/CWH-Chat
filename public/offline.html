<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CWH Chat – Offline</title>
  <meta name="theme-color" content="#020617" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #020617;
      color: #94a3b8;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }

    body::before {
      width: 50vw; height: 50vw;
      background: #4f46e5;
      top: -15%;
      left: -15%;
      animation: pulse 4s ease-in-out infinite;
    }

    body::after {
      width: 40vw; height: 40vw;
      background: #7c3aed;
      bottom: -15%;
      right: -15%;
      animation: pulse 4s ease-in-out infinite 2s;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.25; transform: scale(1.05); }
    }

    .card {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      position: relative;
      z-index: 10;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    .icon {
      width: 5rem; height: 5rem;
      background: rgba(79,70,229,0.15);
      border: 1px solid rgba(79,70,229,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    svg { width: 2.5rem; height: 2.5rem; color: #818cf8; }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-weight: 600;
      font-size: 0.875rem;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      box-shadow: 0 10px 30px -5px rgba(79,70,229,0.4);
      transition: opacity 0.2s, transform 0.2s;
      text-decoration: none;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. CWH Chat needs an internet connection to send and receive messages.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:1rem;height:1rem">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
      Try Again
    </a>
  </div>
</body>
</html>
